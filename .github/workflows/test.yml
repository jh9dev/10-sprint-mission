name: CI-test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: discodeit
          POSTGRES_USER: discodeit_user
          POSTGRES_PASSWORD: discodeit1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U discodeit_user -d discodeit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 실행
        env:
          DB_URL: jdbc:postgresql://localhost:5432/discodeit
          DB_USERNAME: discodeit_user
          DB_PASSWORD: discodeit1234
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Codecov 업로드
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}